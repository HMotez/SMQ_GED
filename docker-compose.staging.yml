# =============================================================
# SMQ_GED — Docker Compose STAGING
# Environnement de test avant déploiement en production
# Usage : docker compose -f docker-compose.staging.yml up --build -d
# =============================================================
# RÈGLE : toute mise à jour doit être validée ici AVANT prod
# Ports différents (8080/8443) pour coexister avec la prod
# =============================================================

services:

  # ── PostgreSQL Staging ───────────────────────────────────────
  postgres_staging:
    image: postgres:16-alpine
    container_name: smq_db_staging
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}_staging
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smq_staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── ClamAV Staging ───────────────────────────────────────────
  clamav_staging:
    image: clamav/clamav:stable
    container_name: smq_clamav_staging
    restart: unless-stopped
    volumes:
      - clamav_data_staging:/var/lib/clamav
    networks:
      - smq_staging_network

  # ── Backend Staging ──────────────────────────────────────────
  backend_staging:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    image: smq_ged-backend:staging
    container_name: smq_backend_staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      DB_HOST:      postgres_staging
      NODE_ENV:     staging
      UPLOAD_DIR:   /app/storage_staging
      CLAMAV_HOST:  clamav_staging
      CLAMAV_PORT:  "3310"
    volumes:
      - storage_staging:/app/storage_staging
    expose:
      - "4000"
    networks:
      - smq_staging_network
    depends_on:
      postgres_staging:
        condition: service_healthy
      clamav_staging:
        condition: service_started

  # ── Frontend Staging ─────────────────────────────────────────
  frontend_staging:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    image: smq_ged-frontend:staging
    container_name: smq_frontend_staging
    restart: unless-stopped
    ports:
      - "8080:80"    # HTTP staging → 8080 (redirigé vers HTTPS)
      - "8443:443"   # HTTPS staging → 8443
    networks:
      - smq_staging_network
    depends_on:
      - backend_staging

# ── Named Volumes Staging ────────────────────────────────────
volumes:
  pgdata_staging:
    name: smq_pgdata_staging
  storage_staging:
    name: smq_storage_staging
  clamav_data_staging:
    name: smq_clamav_data_staging

# ── Staging Network (isolé de la prod) ───────────────────────
networks:
  smq_staging_network:
    driver: bridge
    name: smq_staging_network
