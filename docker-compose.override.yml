# ============================================================
# docker-compose.override.yml
# RÔLE : Surcharge Docker Compose pour l'environnement de développement.
#        Fusionné automatiquement avec docker-compose.yml par Docker.
#        Expose le port 4000 du backend directement sur la machine
#        hôte pour permettre aux tests Jest de s'exécuter sans
#        passer par Nginx.
#        NE PAS utiliser en production.
#
# Différences avec la prod :
#   - backend port 4000 exposé sur l'hôte (tests locaux)
#   - AUTH_RATE_LIMIT_MAX=1000 pour ne pas bloquer les tests
#
# Usage : docker compose up -d  (override appliqué automatiquement)
# Dev/Test only — fusionne automatiquement avec docker-compose.yml
# ============================================================

services:
  backend:
    ports:
      - "4000:4000"
