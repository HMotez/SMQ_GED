# =============================================================
# SMQ_GED — Nginx Configuration
# Sprint 7 — Dockerisation & Déploiement Containerisé
# =============================================================
# Serves the React SPA and reverse-proxies all backend routes.
# Backend service is reachable at http://backend:4000 inside
# the Docker network (smq_network).
# =============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (documents)
    client_max_body_size 50m;

    # ── React SPA — catch-all for client-side routing ─────────
    # Must come first as a fallback; all non-proxied paths land here
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: REST API ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Proxy: AI streaming (SSE — must come BEFORE /api/ai/) ───
    # proxy_buffering MUST be off for Server-Sent Events to work.
    # Without this, Nginx buffers the stream and the client receives
    # nothing until the connection closes.
    location /api/ai/stream {
        proxy_pass         http://backend:4000/api/ai/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Disable all buffering — required for SSE
        proxy_buffering    off;
        proxy_cache        off;
        add_header         X-Accel-Buffering no;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Proxy: AI routes (longer timeout for Groq calls) ─────
    location /api/ai/ {
        proxy_pass         http://backend:4000/api/ai/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Groq llama-3.3-70b — generous timeout
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── Proxy: Static file serving ────────────────────────────
    location /files/ {
        proxy_pass         http://backend:4000/files/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Proxy: File download (force attachment) ───────────────
    location /download/ {
        proxy_pass         http://backend:4000/download/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Proxy: File preview (inline) ─────────────────────────
    location /preview/ {
        proxy_pass         http://backend:4000/preview/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Proxy: LibreOffice format conversion ──────────────────
    location /convert/ {
        proxy_pass         http://backend:4000/convert/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Conversion can take up to 90s (LibreOffice timeout in server.js)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
    gzip_min_length 1024;
}
