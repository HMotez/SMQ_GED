# =============================================================
# SMQ_GED — Nginx Configuration
# Sprint 7 — Dockerisation & Déploiement Containerisé
# Sprint 8 — SSL/TLS Sécurité (Recommandation de sécurité)
# =============================================================
# Serves the React SPA and reverse-proxies all backend routes.
# Backend service is reachable at http://backend:4000 inside
# the Docker network (smq_network).
# HTTPS enforcement: All traffic on 80 redirects to 443
# =============================================================

# ── Hide Nginx version (Endurcissement infrastructure) ──────────
server_tokens off;

# ── WAF — Block common attack patterns ──────────────────────────
# SQL Injection — matches raw URI incl. URL-encoded spaces (%20/+/%2520)
map $request_uri $block_sqli {
    default 0;
    ~*(%27|--|%23|union(%20|%2b|%2520|\+)select|select(%20|%2b|\+).*(from|where)|insert(%20|%2b|\+)into|drop(%20|%2b|\+)table|update(%20|%2b|\+).*set|delete(%20|%2b|\+)from|exec(%20|%2b|\+|%28|\()|xp_cmdshell|information_schema|sleep\(|benchmark\() 1;
}
# XSS — raw and URL-encoded variants
map $request_uri $block_xss {
    default 0;
    ~*(<script|%3cscript|%3c%73cript|javascript:|vbscript:|onload\s*=|onerror\s*=|onclick\s*=|document\.cookie|document\.write|eval\s*%28|eval\s*\() 1;
}
# Path traversal — percent-encoded sequences (raw ../ is normalized by nginx)
map $request_uri $block_traversal {
    default 0;
    ~*(%2e%2e%2f|%2e%2e\/|\.\.%2f|%252e%252e|%c0%af|%c1%9c) 1;
}
# Suspicious user-agents (scanners / attack tools)
map $http_user_agent $block_agent {
    default 0;
    ~*(nikto|sqlmap|nmap|masscan|zgrab|gobuster|dirbuster|wfuzz|hydra|burpsuite|acunetix|openvas|nessus|appscan|nuclei|metasploit|havij|pangolin|w3af) 1;
}

# ── HTTP Server: Redirect all traffic to HTTPS ─────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # Redirect all HTTP traffic to HTTPS
    # Preserve path and query string
    return 301 https://$host$request_uri;
}

# ── HTTPS Server (Primary) ────────────────────────────────────
server {
    # Listen HTTPS on 443 with HTTP/2 support
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name localhost;

    # ── SSL/TLS Certificate Configuration ──────────────────────
    # DEV  : self-signed cert from ./frontend/certs/ (scripts/generate-certs.sh)
    # PROD : replace with CA-signed cert (Let's Encrypt / ACTIA enterprise CA)
    #        certbot certonly --webroot -w /usr/share/nginx/html -d your.domain
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # OCSP Stapling — validation certificat en temps réel
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── SSL Protocol & Cipher Configuration ────────────────────
    # Modern configuration (TLS 1.2+)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # ── Security Headers (HSTS, CSP, etc.) ────────────────────
    # HSTS: Force HTTPS for 365 days, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # X-Content-Type-Options: Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-Frame-Options: Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-XSS-Protection: Enable XSS filter
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy: Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy: Control feature permissions
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content-Security-Policy: Control resource loading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'self'; object-src 'self';" always;

    # ── WAF enforcement ────────────────────────────────────────
    if ($block_sqli)     { return 403; }
    if ($block_xss)      { return 403; }
    if ($block_traversal){ return 403; }
    if ($block_agent)    { return 403; }

    # ── Bypass WAF for static assets (JS/CSS bundles) ─────────
    # Vite-generated filenames contain '--' which false-triggers SQL injection check
    location /assets/ {
        # Serve static files directly without WAF scanning
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Only allow safe HTTP methods
    if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|OPTIONS|HEAD)$) {
        return 405;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (documents)
    client_max_body_size 50m;

    # ── Let's Encrypt / Certbot ACME challenge ────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── React SPA — catch-all for client-side routing ─────────
    # Must come first as a fallback; all non-proxied paths land here
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: REST API ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_read_timeout 120s;
    }

    # ── Proxy: AI streaming (SSE — must come BEFORE /api/ai/) ───
    # proxy_buffering MUST be off for Server-Sent Events to work.
    # Without this, Nginx buffers the stream and the client receives
    # nothing until the connection closes.
    location /api/ai/stream {
        proxy_pass         http://backend:4000/api/ai/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   Connection        "";
        # Disable all buffering — required for SSE
        proxy_buffering    off;
        proxy_cache        off;
        add_header         X-Accel-Buffering no;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Proxy: AI routes (longer timeout for Groq calls) ─────
    location /api/ai/ {
        proxy_pass         http://backend:4000/api/ai/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        # Groq llama-3.3-70b — generous timeout
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── Proxy: Static file serving ────────────────────────────
    location /files/ {
        proxy_pass         http://backend:4000/files/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Proxy: File download (force attachment) ───────────────
    location /download/ {
        proxy_pass         http://backend:4000/download/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Proxy: File preview (inline) ─────────────────────────
    location /preview/ {
        proxy_pass         http://backend:4000/preview/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Proxy: LibreOffice format conversion ──────────────────
    location /convert/ {
        proxy_pass         http://backend:4000/convert/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Conversion can take up to 90s (LibreOffice timeout in server.js)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
    gzip_min_length 1024;
}
