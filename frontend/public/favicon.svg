<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f30"/>
      <stop offset="100%" stop-color="#071118"/>
    </linearGradient>
    <linearGradient id="green1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5dde50"/>
      <stop offset="100%" stop-color="#2ea828"/>
    </linearGradient>
    <linearGradient id="green2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ab83f"/>
      <stop offset="100%" stop-color="#357a2d"/>
    </linearGradient>
    <linearGradient id="green3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3da033"/>
      <stop offset="100%" stop-color="#266020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none"
        stroke="rgba(74,184,63,0.35)" stroke-width="1.5"/>

  <!-- ACTIA grid logo — 3x3 matrix of squares (top-left 2x2 solid, others faded) -->
  <!-- Row 1 -->
  <rect x="10" y="10" width="12" height="12" rx="2.5" fill="url(#green1)" filter="url(#glow)"/>
  <rect x="26" y="10" width="12" height="12" rx="2.5" fill="url(#green2)" opacity="0.85"/>
  <rect x="42" y="10" width="12" height="12" rx="2.5" fill="url(#green3)" opacity="0.5"/>

  <!-- Row 2 -->
  <rect x="10" y="26" width="12" height="12" rx="2.5" fill="url(#green2)" opacity="0.85"/>
  <rect x="26" y="26" width="12" height="12" rx="2.5" fill="url(#green1)" opacity="0.6" filter="url(#glow)"/>
  <rect x="42" y="26" width="12" height="12" rx="2.5" fill="url(#green3)" opacity="0.35"/>

  <!-- Row 3 -->
  <rect x="10" y="42" width="12" height="12" rx="2.5" fill="url(#green3)" opacity="0.5"/>
  <rect x="26" y="42" width="12" height="12" rx="2.5" fill="url(#green3)" opacity="0.3"/>
  <rect x="42" y="42" width="12" height="12" rx="2.5" fill="url(#green3)" opacity="0.15"/>
</svg>
