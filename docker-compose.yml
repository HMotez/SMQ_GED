# =============================================================
# SMQ_GED — Docker Compose  (ACTIA Engineering Services)
# Sprint 42 — Endurcissement infrastructure
# =============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    # Logging : detect unauthorized connections (Gestion BD)
    command: >
      postgres
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c log_min_duration_statement=2000
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smq_network
    # DB is NOT exposed to the host — accessible only inside smq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Apache Kafka (KRaft mode — no ZooKeeper) ─────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: smq_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smq_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s

  # ── ClamAV Antivirus (Endurcissement infrastructure) ─────────
  clamav:
    image: clamav/clamav:stable
    container_name: smq_clamav
    restart: unless-stopped
    environment:
      CLAMAV_NO_CLAMD:    "false"
      CLAMAV_NO_FRESHCLAM: "false"
      FRESHCLAM_CHECKS:   "1"
    volumes:
      - clamav_db:/var/lib/clamav
    networks:
      - smq_network
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout:  10s
      retries:  3
      start_period: 120s

  # ── Backend API (Node.js / Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    image: smq_ged-backend:sprint43
    container_name: smq_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST:     postgres
      DB_SSL:      "false"
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPLOAD_DIR:  /app/storage
      # ClamAV antivirus service (virusScanMiddleware)
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
    volumes:
      - "/app/storage:/app/storage"
    # Backend not exposed to host — only reachable via nginx (HTTPS + WAF)
    expose:
      - "4000"
    networks:
      - smq_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clamav:
        condition: service_started

  # ── Backup automatique PostgreSQL (Gestion des sauvegardes) ──
  backup:
    image: postgres:16-alpine
    container_name: smq_backup
    restart: unless-stopped
    environment:
      PGPASSWORD:  ${DB_PASSWORD}
      DB_HOST:     postgres
      DB_USER:     ${DB_USER}
      DB_NAME:     ${DB_NAME}
    volumes:
      - ./backups:/backups
      - ./scripts/docker-backup.sh:/docker-backup.sh:ro
    networks:
      - smq_network
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/docker-backup.sh"]

  # ── Frontend (React + Nginx + WAF) ───────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    image: smq_ged-frontend:sprint43
    container_name: smq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
    networks:
      - smq_network
    depends_on:
      - backend

  # ── Trivy — Scanner de vulnérabilités (profile audit) ────────
  # Utilisation : docker compose --profile audit run --rm trivy
  trivy:
    image: aquasec/trivy:latest
    container_name: smq_trivy
    profiles: ["audit"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy-cache:/root/.cache/trivy
      - ./reports/security:/reports
    command: >
      image --severity HIGH,CRITICAL --no-progress
      smq_ged-backend:sprint43
    networks:
      - smq_network

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pgdata:
    name: smq_pgdata
  storage:
    name: smq_storage
  kafka_data:
    name: smq_kafka_data
  clamav_db:
    name: smq_clamav_db
  trivy-cache:
    name: smq_trivy_cache
  # backups/ is a bind-mount (./backups) — not a named volume,
  # so files are directly accessible on the host for archiving/transfer

# ── Internal Network ──────────────────────────────────────────
networks:
  smq_network:
    driver: bridge
    name: smq_network
