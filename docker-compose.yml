# =============================================================
# SMQ_GED — Docker Compose
# Sprint 7 — Dockerisation & Déploiement Containerisé
# =============================================================
#
# Services:
#   postgres  — PostgreSQL 16 (internal only, not exposed)
#   backend   — Node.js Express API on port 4000
#   frontend  — React SPA served by Nginx on port 80
#
# Usage:
#   docker-compose up --build        (first run / after code changes)
#   docker-compose up -d             (detached mode)
#   docker-compose down              (stop and remove containers)
#   docker-compose down -v           (also remove volumes — fresh DB)
#   docker-compose logs -f backend   (follow backend logs)
# =============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      # Persistent data — survives container restarts
      - pgdata:/var/lib/postgresql/data
      # Init script — runs ONCE automatically on first startup (empty pgdata)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smq_network
    # DB is NOT exposed to the host — accessible only inside smq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Backend API (Node.js / Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: smq_backend
    restart: unless-stopped
    # All variables come from the root .env file (docker-compose default)
    # Values defined there are used both for ${VAR} interpolation in this
    # file and as container environment variables via env_file below.
    env_file:
      - .env
    environment:
      # Ensure DB_HOST always points to the postgres service name,
      # regardless of what is in .env
      DB_HOST: postgres
    volumes:
      # Named volume shared with host for uploaded files persistence
      - storage:/app/storage
    ports:
      # Exposed so Docker Desktop users can also test the API directly
      - "4000:4000"
    networks:
      - smq_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time by Vite
        # Empty VITE_BACKEND_URL → relative paths (/download/, /preview/)
        # proxied by Nginx to backend:4000
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    container_name: smq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - smq_network
    depends_on:
      - backend

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pgdata:
    name: smq_pgdata
  storage:
    name: smq_storage

# ── Internal Network ─────────────────────────────────────────
networks:
  smq_network:
    driver: bridge
    name: smq_network
