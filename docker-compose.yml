# =============================================================
# SMQ_GED — Docker Compose  (ACTIA Engineering Services)
# =============================================================
#
# Sprints embarqués dans cette image :
#   Sprint 1-2 : CRUD documents, workflow ISO, statuts, types
#   Sprint 3   : JWT Authentication, gestion utilisateurs
#   Sprint 4   : Dashboard KPIs & statistiques
#   Sprint 5   : Notifications intelligentes (expiration, inactivité)
#   Sprint 6   : Module IA (chatbot Gemini, classification, extraction dates)
#   Sprint 7   : Dockerisation & déploiement containerisé
#   Sprint 8   : Système 3 rôles (Admin / Ing. Qualité / Reviewer)
#               + Role switcher sidebar & navbar
#   Sprint 9   : Page d'accueil publique (sans authentification)
#               + LoginModal contextuel (accès démo 3 rôles)
#               + Inscription limitée à Ing. Qualité & Reviewer
#               + Tableau de bord accessible depuis le menu public
#               + Actions protégées → modal de connexion contextuel
#   Sprint 10  : Mode visiteur par défaut (suppression auto-login Admin)
#               + Navbar visiteur : boutons Connexion & S'inscrire
#               + Déconnexion → retour page d'accueil publique (/)
#               + Session persistante uniquement si token valide
#
# Services :
#   postgres  — PostgreSQL 16 (réseau interne uniquement)
#   backend   — Express API :4000 + LibreOffice + Module IA
#   frontend  — React SPA via Nginx :80 (reverse-proxy → backend)
#
# Tables DB créées automatiquement au démarrage :
#   ai_query_logs   — journalisation requêtes chatbot IA
#   user_requests   — demandes d'inscription en attente
#   notifications   — système de notifications par rôle
#
# Utilisateurs créés au démarrage (ensureDefaultUsers) :
#   admin@actia.com    / Admin123!   → rôle Admin        (pré-configuré)
#   ing@actia.com      / Ing123!     → rôle Ing. Qualité (pré-configuré)
#   reviewer@actia.com / Rev123!     → rôle Reviewer     (pré-configuré)
#
# Inscription :
#   Ing. Qualité & Reviewer peuvent s'inscrire → validation Admin requise
#   Le compte Admin est unique et non-sélectionnable à l'inscription
#
# ── Commandes utiles ──────────────────────────────────────────
#
#   Premier lancement (build complet) :
#     docker compose up --build
#
#   Lancement en arrière-plan :
#     docker compose up -d --build
#
#   Arrêt :
#     docker compose down
#
#   Arrêt + suppression des données (BDD neuve) :
#     docker compose down -v
#
#   Voir les logs en temps réel :
#     docker compose logs -f backend
#     docker compose logs -f frontend
#
#   Rebuild après modification du code :
#     docker compose up --build -d
#
#   Ouvrir un shell dans le backend :
#     docker exec -it smq_backend sh
#
#   Ouvrir psql dans la base :
#     docker exec -it smq_db psql -U postgres -d smq_db
#
# ── Hors-ligne (réseau d'entreprise / TLS timeout) ───────────
#   docker compose -f docker-compose.yml -f docker-compose.offline.yml up --build -d
#
# ── Accès ─────────────────────────────────────────────────────
#   Application : http://localhost
#   API directe : http://localhost:4000/api
# =============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      # Persistent data — survives container restarts
      - pgdata:/var/lib/postgresql/data
      # Init script — runs ONCE automatically on first startup (empty pgdata)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smq_network
    # DB is NOT exposed to the host — accessible only inside smq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Backend API (Node.js / Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    # Tag versionné — incrémentez pour forcer le rebuild sur les nœuds distants
    image: smq_ged-backend:sprint10
    container_name: smq_backend
    restart: unless-stopped
    # All variables come from the root .env file (docker-compose default)
    # Values defined there are used both for ${VAR} interpolation in this
    # file and as container environment variables via env_file below.
    env_file:
      - .env
    environment:
      # Ensure DB_HOST always points to the postgres service name,
      # regardless of what is in .env
      DB_HOST: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      # Named volume shared with host for uploaded files persistence
      - storage:/app/storage
    ports:
      # Exposed so Docker Desktop users can also test the API directly
      - "4000:4000"
    networks:
      - smq_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time by Vite
        # Empty VITE_BACKEND_URL → relative paths (/download/, /preview/)
        # proxied by Nginx to backend:4000
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    # Tag versionné — incrémentez pour forcer le rebuild sur les nœuds distants
    image: smq_ged-frontend:sprint10
    container_name: smq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - smq_network
    depends_on:
      - backend

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pgdata:
    name: smq_pgdata
  storage:
    name: smq_storage

# ── Internal Network ─────────────────────────────────────────
networks:
  smq_network:
    driver: bridge
    name: smq_network
