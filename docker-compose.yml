# =============================================================
# SMQ_GED — Docker Compose
# Sprint 7 — Dockerisation & Déploiement Containerisé
# Sprint 6 — Module IA (chatbot NLP, classification, extraction dates,
#             amélioration continue) — aucun service additionnel requis,
#             l'IA est intégrée dans le backend Express + PostgreSQL.
# =============================================================
#
# Services:
#   postgres  — PostgreSQL 16 (internal only, not exposed)
#   backend   — Node.js Express API on port 4000
#               + Module IA Sprint 6 (/api/ai/*)
#               + LibreOffice pour conversion de documents
#   frontend  — React SPA served by Nginx on port 80
#               + Page /ai — Assistant IA (chatbot, classification, etc.)
#
# Sprint 6 — Tables DB créées automatiquement au démarrage :
#   ai_query_logs — journalisation des requêtes chatbot IA
#   (voir aussi db/init.sql table 13 et migration 003)
#
# Usage (connexion Docker Hub disponible) :
#   docker-compose up --build        (premier lancement / après modifs)
#   docker-compose up -d             (mode détaché)
#   docker-compose down              (arrêt + suppression containers)
#   docker-compose down -v           (+ suppression volumes — BDD neuve)
#   docker-compose logs -f backend   (suivre les logs backend)
#   docker-compose logs -f frontend  (suivre les logs nginx)
#
# Usage hors-ligne (Docker Hub inaccessible — TLS timeout) :
#   docker-compose -f docker-compose.yml -f docker-compose.offline.yml up --build -d
#   .\scripts\build-offline.ps1      (raccourci PowerShell)
#
# Fix permanent (réseau d'entreprise) :
#   .\scripts\configure-docker-mirror.ps1   (configure mirror.gcr.io)
# =============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      # Persistent data — survives container restarts
      - pgdata:/var/lib/postgresql/data
      # Init script — runs ONCE automatically on first startup (empty pgdata)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smq_network
    # DB is NOT exposed to the host — accessible only inside smq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Backend API (Node.js / Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    # Tag explicite → permet le rebuild offline via Dockerfile.offline
    image: smq_ged-backend:latest
    container_name: smq_backend
    restart: unless-stopped
    # All variables come from the root .env file (docker-compose default)
    # Values defined there are used both for ${VAR} interpolation in this
    # file and as container environment variables via env_file below.
    env_file:
      - .env
    environment:
      # Ensure DB_HOST always points to the postgres service name,
      # regardless of what is in .env
      DB_HOST: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      # Named volume shared with host for uploaded files persistence
      - storage:/app/storage
    ports:
      # Exposed so Docker Desktop users can also test the API directly
      - "4000:4000"
    networks:
      - smq_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time by Vite
        # Empty VITE_BACKEND_URL → relative paths (/download/, /preview/)
        # proxied by Nginx to backend:4000
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    # Tag explicite → permet le rebuild offline via Dockerfile.offline
    image: smq_ged-frontend:latest
    container_name: smq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - smq_network
    depends_on:
      - backend

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pgdata:
    name: smq_pgdata
  storage:
    name: smq_storage

# ── Internal Network ─────────────────────────────────────────
networks:
  smq_network:
    driver: bridge
    name: smq_network
