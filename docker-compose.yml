# =============================================================
# SMQ_GED — Docker Compose  (ACTIA Engineering Services)
# =============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      # Persistent data — survives container restarts
      - pgdata:/var/lib/postgresql/data
      # Init script — runs ONCE automatically on first startup (empty pgdata)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smq_network
    # DB is NOT exposed to the host — accessible only inside smq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

  # ── Apache Kafka (KRaft mode — no ZooKeeper) ─────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: smq_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smq_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend API (Node.js / Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    # Tag versionné — incrémentez pour forcer le rebuild sur les nœuds distants
    image: smq_ged-backend:sprint16
    container_name: smq_backend
    restart: unless-stopped
    # All variables come from the root .env file (docker-compose default)
    # Values defined there are used both for ${VAR} interpolation in this
    # file and as container environment variables via env_file below.
    env_file:
      - .env
    environment:
      # Ensure DB_HOST always points to the postgres service name,
      # regardless of what is in .env
      DB_HOST: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      # Named volume shared with host for uploaded files persistence
      - storage:/app/storage
    ports:
      # Exposed so Docker Desktop users can also test the API directly
      - "4000:4000"
    networks:
      - smq_network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time by Vite
        # Empty VITE_BACKEND_URL → relative paths (/download/, /preview/)
        # proxied by Nginx to backend:4000
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    # Tag versionné — incrémentez pour forcer le rebuild sur les nœuds distants
    image: smq_ged-frontend:sprint16
    container_name: smq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - smq_network
    depends_on:
      - backend

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pgdata:
    name: smq_pgdata
  storage:
    name: smq_storage
  kafka_data:
    name: smq_kafka_data

# ── Internal Network ─────────────────────────────────────────
networks:
  smq_network:
    driver: bridge
    name: smq_network
