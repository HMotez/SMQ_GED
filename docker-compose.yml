# =============================================================
# SMQ_GED — Docker Compose  (ACTIA Engineering Services)
# Endurcissement infrastructure
# =============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_ADMIN_USER}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    # Logging only here — SSL is configured via postgresql.conf by copy-ssl.sh on first init
    command: >
      postgres
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c log_min_duration_statement=2000
    entrypoint: ["/bin/bash", "/entrypoint-ssl.sh"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./backend/migrations/006_add_manuel_folder.sql:/docker-entrypoint-initdb.d/06_add_manuel_folder.sql:ro
      - ./backend/migrations/007_versions_created_by.sql:/docker-entrypoint-initdb.d/07_versions_created_by.sql:ro
      - ./backend/migrations/008_strip_v_prefix.sql:/docker-entrypoint-initdb.d/08_strip_v_prefix.sql:ro
      - ./backend/migrations/009_least_privilege_user.sql:/docker-entrypoint-initdb.d/09_least_privilege_user.sql:ro
      - ./db/copy-ssl.sh:/docker-entrypoint-initdb.d/copy-ssl.sh:ro
      - ./db/entrypoint-ssl.sh:/entrypoint-ssl.sh:ro
      - ./db/certs/server.crt:/tmp/pg-ssl/server.crt:ro
      - ./db/certs/server.key:/tmp/pg-ssl/server.key:ro
    networks:
      - smq_network
    # DB is NOT exposed to the host — accessible only inside smq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

  # ── Apache Kafka (KRaft mode — no ZooKeeper) ─────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: smq_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smq_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s

  # ── ClamAV Antivirus (Endurcissement infrastructure) ─────────
  clamav:
    image: clamav/clamav:stable
    container_name: smq_clamav
    restart: unless-stopped
    environment:
      CLAMAV_NO_CLAMD:    "false"
      CLAMAV_NO_FRESHCLAM: "false"
      FRESHCLAM_CHECKS:   "1"
    volumes:
      - clamav_db:/var/lib/clamav
    networks:
      - smq_network
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout:  10s
      retries:  3
      start_period: 120s

  # ── Backend API (Node.js / Express) ─────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    image: smq_ged-backend
    container_name: smq_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST:     postgres
      DB_SSL:      "true"
      UPLOAD_DIR:  /app/storage
      KAFKA_BROKER: kafka:9092
      # ClamAV antivirus service (virusScanMiddleware)
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      # Higher limit for dev/test so the full test suite doesn't exhaust the auth quota
      AUTH_RATE_LIMIT_MAX: "1000"
    volumes:
      - "${STORAGE_PATH:-/app/storage}:/app/storage"
    # Backend not exposed to host — only reachable via nginx (HTTPS + WAF)
    expose:
      - "4000"
    networks:
      - smq_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clamav:
        condition: service_started

  # ── Backup automatique PostgreSQL (Gestion des sauvegardes) ──
  backup:
    image: postgres:16-alpine
    container_name: smq_backup
    restart: unless-stopped
    environment:
      PGPASSWORD:  ${DB_PASSWORD}
      DB_HOST:     postgres
      DB_USER:     ${DB_USER}
      DB_NAME:     ${DB_NAME}
    volumes:
      - ./backups:/backups
      - ./scripts/docker-backup.sh:/docker-backup.sh:ro
    networks:
      - smq_network
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/docker-backup.sh"]

  # ── Frontend (React + Nginx + WAF) ───────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:     /api
        VITE_BACKEND_URL: ""
    image: smq_ged-frontend
    container_name: smq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
    networks:
      - smq_network
    depends_on:
      - backend

  # ── Certbot — Renouvellement automatique Let's Encrypt ───────
  # Renouvelle le cert SSL tous les 12h si nécessaire
  certbot:
    image: certbot/certbot:latest
    container_name: smq_certbot
    profiles: ["ssl-prod"]
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - smq_network

  # ── Prometheus — Collecte des métriques (Supervision) ────────
  # Utilisation : docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:latest
    container_name: smq_prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    expose:
      - "9090"
    networks:
      - smq_network
    restart: unless-stopped

  # ── Grafana — Tableaux de bord (Supervision) ─────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: smq_grafana
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-REDACTED}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    networks:
      - smq_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Patch Monitor — Veille npm audit automatique (profile audit) ─
  # Utilisation : docker compose --profile audit run --rm patch-monitor
  # Lance npm audit sur backend + frontend et sauvegarde dans reports/security/
  patch-monitor:
    image: node:20-slim
    container_name: smq_patch_monitor
    profiles: ["audit"]
    volumes:
      - ./backend/package.json:/workspace/backend/package.json:ro
      - ./backend/package-lock.json:/workspace/backend/package-lock.json:ro
      - ./frontend/package.json:/workspace/frontend/package.json:ro
      - ./frontend/package-lock.json:/workspace/frontend/package-lock.json:ro
      - ./reports/security:/reports
    entrypoint:
      - sh
      - -c
      - |
        REPORT="/reports/npm-audit-$(date +%Y%m%d_%H%M%S).txt"
        echo "SMQ_GED — NPM Audit $(date)" > $$REPORT
        echo "================================================" >> $$REPORT
        echo "--- [1/2] Backend ---" >> $$REPORT
        cd /workspace/backend && npm audit --audit-level=high 2>&1 | tee -a $$REPORT || true
        echo "" >> $$REPORT
        echo "--- [2/2] Frontend ---" >> $$REPORT
        cd /workspace/frontend && npm audit --audit-level=high 2>&1 | tee -a $$REPORT || true
        echo "" >> $$REPORT
        echo "Rapport sauvegardé : $$REPORT"
    networks:
      - smq_network

  # ── Trivy — Scanner de vulnérabilités (profile audit) ────────
  # Utilisation : docker compose --profile audit run --rm trivy
  trivy:
    image: aquasec/trivy:latest
    container_name: smq_trivy
    profiles: ["audit"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy-cache:/root/.cache/trivy
      - ./reports/security:/reports
    command: >
      image --severity HIGH,CRITICAL --no-progress --format table
      --output /reports/trivy-report.txt
      smq_ged-backend
    networks:
      - smq_network

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  pgdata:
    name: smq_pgdata
  storage:
    name: smq_storage
  kafka_data:
    name: smq_kafka_data
  clamav_db:
    name: smq_clamav_db
  trivy-cache:
    name: smq_trivy_cache
  certbot-certs:
    name: smq_certbot_certs
  certbot-www:
    name: smq_certbot_www
  prometheus_data:
    name: smq_prometheus_data
  grafana_data:
    name: smq_grafana_data
  # backups/ is a bind-mount (./backups) — not a named volume,
  # so files are directly accessible on the host for archiving/transfer

# ── Internal Network ──────────────────────────────────────────
networks:
  smq_network:
    driver: bridge
    name: smq_network
